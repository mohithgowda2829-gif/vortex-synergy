databases:
  - name: vortex-synergy-db
    plan: free
    databaseName: vortex_synergy
    user: vortex_synergy
    ipAllowList: []

services:
  - type: web
    name: vortex-synergy-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: vortex-synergy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: EXPOSE_PASSWORD_RESET_TOKEN
        value: "false"
      - key: PASSWORD_RESET_TOKEN_HOURS
        value: "1"
      - key: UPLOAD_DIR
        value: /app/storage/uploads
